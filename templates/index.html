<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabelGenerator & DO Processor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 500px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; text-align: center; }
        input[type="file"] { margin: 20px 0; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Upload Weekly Delivery Order</h2>
        <form action="/process" method="POST" enctype="multipart/form-data">
            <input type="file" name="file" accept=".xls,.xlsx" required>
            <br>
            <button type="submit">Process Excel File</button>
        </form>
    </div>
</body>
</html>
